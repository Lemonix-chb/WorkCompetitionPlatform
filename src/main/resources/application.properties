# 应用名称
spring.application.name=WorkCompetitionPlatform

# MySQL数据库连接配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/work_competition_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# MyBatis Plus配置
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# Redis配置
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-wait=-1ms
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# 文件上传配置
spring.servlet.multipart.max-file-size=300MB
spring.servlet.multipart.max-request-size=300MB

# 文件上传目录配置（绝对路径）
file.upload-dir=E:/JavaProject/WorkCompetitionPlatform/uploads

# JWT配置
jwt.secret=WorkCompetitionPlatformSecretKey2024HunanAgriculturalUniversity
jwt.expiration=86400000
jwt.header=Authorization

# 日志配置
logging.level.com.example.workcompetitionplatform=DEBUG

# SpringDoc OpenAPI配置
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
logging.level.org.hibernate.SQL=DEBUG

# Spring MVC静态资源配置
# 明确配置静态资源路径模式，避免与API路径冲突
spring.mvc.static-path-pattern=/static/**
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8
spring.jackson.serialization.write-dates-as-timestamps=false
